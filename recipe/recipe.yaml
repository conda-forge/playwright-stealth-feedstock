schema_version: 1

context:
  name: playwright-stealth
  version: "2.0.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 1d8e488fbdd8f190f1269ea8cf5d57d14df3a9f1af1001c41ee3588b2aac3133

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - poetry-core
    - pip
  run:
    - playwright >=1.40.0
    - python >=${{ python_min }}
    - setuptools
    - playwright-python

tests:
  - python:
      imports:
        - playwright_stealth
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: playwright stealth
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/AtuboDad/playwright_stealth

extra:
  recipe-maintainers:
    - jan-janssen
